spring:
  application:
    name: Logistics
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/loadbook}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: update # Keep as update initially for dev, transition to validate with Flyway
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  cache:
    type: caffeine
    cache-names: users, loads, bookings
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

# Security JWT configuration
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: true

logging:
  level:
    com.sdeintern1.Logistics: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.results: INFO
